
[tool.ruff]
line-length = 110
target-version = "py311"
exclude = [
    "__init__.py",
    "doc/conf.py",
    "cassandra-metrics-rename.py",
]

[tool.ruff.lint]
ignore = [
    "N802",
    "N803",
    "N806",
    "N812",
    "N815",
    "N816",
    "N999",
    "D107",
    "D105",
    "D102",
    "D104",
    "D100",
    "D200",
    "D205",
    "D400",
]
select = [
    "E",  # pycodestyle
    "F",  # pycodestyle
    "N",  # pep8-naming
    "W",  # pycodestyle
    "D",  # pydocstyle
    "UP", # pyupgrade
    "C4", # flake8-comprehensions
    "I",  # isort
    "RUF022",  # sort __all__
]
extend-select = [
    "RUF100", # Warn about unused noqa
]

[tool.ruff.lint.per-file-ignores]

[tool.ruff.lint.pycodestyle]
max-doc-length = 79

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.isort]
known-first-party = ["lsst"]

[tool.ruff.format]
docstring-code-format = true
# Formatter does not know about indenting.
docstring-code-line-length = 69
